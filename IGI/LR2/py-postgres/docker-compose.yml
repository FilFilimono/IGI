services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mynetwork

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - mynetwork

  app:
    image: python:3.11-slim
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "pip install psycopg2-binary -q && python main.py"
    depends_on:
      - db
    networks:
      - mynetwork

volumes:
  pgdata:
  pgadmin_data:

networks:
  mynetwork:
    driver: bridge
