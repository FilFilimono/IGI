# ============================================================
# docker-compose.yml — локальный запуск МебельФабрика
# Запуск: docker-compose up --build
# ============================================================
version: '3.9'

services:

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: furniture_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: furniture_factory
      POSTGRES_USER: furniture_user
      POSTGRES_PASSWORD: furniture_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furniture_user -d furniture_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Django Application ----
  web:
    image: ghcr.io/your-username/furniture-factory:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: furniture_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: docker-secret-key-change-in-production-env
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DATABASE_URL: postgresql://furniture_user:furniture_pass_2024@db:5432/furniture_factory
      LOG_LEVEL: INFO
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - log_files:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        python manage.py migrate --noinput &&
        python manage.py seed_data &&
        python manage.py collectstatic --noinput &&
        gunicorn furniture_factory.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
      "

  # ---- Nginx (reverse proxy + static files) ----
  nginx:
    image: nginx:alpine
    container_name: furniture_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_files:
  static_files:
  log_files:
