{% extends "base.html" %}
{% block title %}Удалить заказ{% endblock %}
{% block content %}
<div class="card"><div class="card-body text-center py-5">
  <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i>
  <h4 class="mt-3">Удалить заказ {{ order.order_number }}?</h4>
  <p class="text-muted">Клиент: {{ order.client.company_name }}</p>
  <form method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
    <a href="{% url 'orders:order_detail' order.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
</div></div>
{% endblock %}
