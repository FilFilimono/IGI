{% extends "base.html" %}
{% block title %}Удалить заказ{% endblock %}
{% block content %}
<p><a href="{% url 'orders:order_detail' order.pk %}">Назад</a></p>
<h2>Удалить заказ {{ order.order_number }}?</h2>
<p>Клиент: {{ order.client.company_name }}</p>
<form method="post">
{% csrf_token %}
<p><button type="submit">Да, удалить</button> <a href="{% url 'orders:order_detail' order.pk %}">Отмена</a></p>
</form>
{% endblock %}
