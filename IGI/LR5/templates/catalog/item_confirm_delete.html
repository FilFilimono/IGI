{% extends "base.html" %}
{% block title %}Удалить изделие{% endblock %}
{% block content %}
<p><a href="{% url 'catalog:item_detail' item.pk %}">Назад</a></p>
<h2>Удалить «{{ item.name }}»?</h2>
<p>Это действие нельзя отменить.</p>
<form method="post">
{% csrf_token %}
<p><button type="submit">Да, удалить</button> <a href="{% url 'catalog:item_detail' item.pk %}">Отмена</a></p>
</form>
{% endblock %}
