{% extends "base.html" %}
{% block title %}Удалить клиента{% endblock %}
{% block content %}
<p><a href="{% url 'clients:client_detail' client.pk %}">Назад</a></p>
<h2>Удалить «{{ client.company_name }}»?</h2>
<p>Код: {{ client.client_code }}</p>
<form method="post">
{% csrf_token %}
<p><button type="submit">Да, удалить</button> <a href="{% url 'clients:client_detail' client.pk %}">Отмена</a></p>
</form>
{% endblock %}
