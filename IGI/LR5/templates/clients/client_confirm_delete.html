{% extends "base.html" %}
{% block title %}Удалить клиента{% endblock %}
{% block content %}
<div class="card"><div class="card-body text-center py-5">
  <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i>
  <h4 class="mt-3">Удалить «{{ client.company_name }}»?</h4>
  <p class="text-muted">Код: {{ client.client_code }}</p>
  <form method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
    <a href="{% url 'clients:client_detail' client.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
</div></div>
{% endblock %}
