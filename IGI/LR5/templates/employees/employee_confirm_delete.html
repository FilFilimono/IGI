{% extends "base.html" %}
{% block title %}Деактивировать сотрудника{% endblock %}
{% block content %}
<div class="card"><div class="card-body text-center py-5">
  <i class="bi bi-person-x text-warning" style="font-size:3rem"></i>
  <h4 class="mt-3">Деактивировать {{ emp.full_name }}?</h4>
  <p class="text-muted">Сотрудник будет скрыт, но не удалён из базы данных.</p>
  <form method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-warning me-2">Деактивировать</button>
    <a href="{% url 'employees:employee_detail' emp.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
</div></div>
{% endblock %}
