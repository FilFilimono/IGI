{% extends "base.html" %}
{% block title %}Новости{% endblock %}
{% block content %}
<h2><i class="bi bi-newspaper"></i> Новости</h2>
<div class="row g-3">
{% for a in articles %}
<div class="col-md-6 col-lg-4">
  <div class="card h-100">
    {% if a.image %}<img src="{{ a.image.url }}" class="card-img-top" style="height:160px;object-fit:cover">{% endif %}
    <div class="card-body">
      <h5 class="card-title">{{ a.title }}</h5>
      <p class="card-text text-muted small">{{ a.summary }}</p>
      <small class="text-muted">{{ a.published_at|date:"d/m/Y" }}</small>
    </div>
  </div>
</div>
{% empty %}<div class="col"><p class="text-muted">Нет новостей.</p></div>{% endfor %}
</div>
{% endblock %}
