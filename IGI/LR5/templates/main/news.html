{% extends "base.html" %}
{% block title %}Новости{% endblock %}
{% block content %}
<h2>Новости</h2>
{% for a in articles %}
<hr>
{% if a.image %}<p><img src="{{ a.image.url }}" alt="{{ a.title }}"></p>{% endif %}
<h3>{{ a.title }}</h3>
<p>{{ a.summary }}</p>
<p>{{ a.published_at|date:"d/m/Y" }}</p>
{% empty %}
<p>Нет новостей.</p>
{% endfor %}
{% endblock %}
