{% extends "base.html" %}
{% block title %}Словарь терминов{% endblock %}
{% block content %}
<h2>Словарь терминов / FAQ</h2>
<form method="get">
<p><input type="text" name="q" value="{{ q }}" placeholder="Поиск..."> <button type="submit">Найти</button></p>
</form>
{% for term in terms %}
<hr>
<h3>{{ term.question }} ({{ term.added_at|date:"d/m/Y" }})</h3>
<p>{{ term.answer|linebreaks }}</p>
{% empty %}
<p>Ничего не найдено.</p>
{% endfor %}
{% endblock %}
