{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header text-center"><h4><i class="bi bi-person-plus"></i> Регистрация</h4></div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Зарегистрироваться</button>
          </div>
        </form>
        <div class="text-center mt-3">
          Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войти</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
