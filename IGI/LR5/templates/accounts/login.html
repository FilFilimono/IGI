{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h2>Вход</h2>
<form method="post" novalidate>
{% csrf_token %}
{% for field in form %}
<p>{{ field.label }}</p>
<p>{{ field }}</p>
{% if field.errors %}<p>{{ field.errors }}</p>{% endif %}
{% endfor %}
<p><button type="submit">Войти</button></p>
</form>
<p>Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a></p>
{% endblock %}
